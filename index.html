<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Routekaarten Overzicht</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #141720; --border: #1e2230;
      --accent-dag: #f5c842; --accent-nacht: #4a7cff;
      --text: #e8eaf0; --muted: #6b7280; --card-hover: #1a1f2e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; padding: 0 0 80px; }
    header { padding: 60px 40px 40px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; top: -80px; right: -80px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(74,124,255,0.12) 0%, transparent 70%); pointer-events: none; }
    .header-label { font-size: 11px; letter-spacing: 4px; color: var(--accent-nacht); text-transform: uppercase; margin-bottom: 16px; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 52px); font-weight: 800; line-height: 1.1; letter-spacing: -1px; }
    h1 span { color: var(--accent-nacht); }
    .header-meta { margin-top: 16px; font-size: 12px; color: var(--muted); }
    .controls { padding: 28px 40px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 7px 16px; border-radius: 4px; cursor: pointer; transition: all 0.15s ease; letter-spacing: 1px; }
    .filter-btn:hover { border-color: var(--accent-nacht); color: var(--text); }
    .filter-btn.active-dag { background: var(--accent-dag); color: #0d0f14; border-color: var(--accent-dag); font-weight: 600; }
    .filter-btn.active-nacht { background: var(--accent-nacht); color: #fff; border-color: var(--accent-nacht); font-weight: 600; }
    .filter-btn.active-all { background: var(--text); color: #0d0f14; border-color: var(--text); font-weight: 600; }
    .search-wrap { margin-left: auto; position: relative; }
    .search-wrap input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 7px 14px 7px 36px; border-radius: 4px; width: 260px; outline: none; transition: border-color 0.15s; }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent-nacht); }
    .search-wrap::before { content: '⌕'; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
    .groups { padding: 40px 40px 0; display: flex; flex-direction: column; gap: 48px; }
    .group-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .group-route { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--text); background: var(--surface); border: 1px solid var(--border); padding: 4px 14px; border-radius: 4px; }
    .group-plate { font-size: 12px; color: var(--accent-nacht); letter-spacing: 2px; }
    .group-count { font-size: 11px; color: var(--muted); letter-spacing: 2px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .card { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 18px 20px; text-decoration: none; color: var(--text); transition: background 0.15s, border-color 0.15s, transform 0.15s; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
    .card.dag::before { background: var(--accent-dag); }
    .card.nacht::before { background: var(--accent-nacht); }
    .card:hover { background: var(--card-hover); transform: translateY(-2px); }
    .card.dag:hover { border-color: var(--accent-dag); }
    .card.nacht:hover { border-color: var(--accent-nacht); }
    .card-date { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .card-plate { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .card-type { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .card.dag .card-type { color: var(--accent-dag); }
    .card.nacht .card-type { color: var(--accent-nacht); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .dag .dot { background: var(--accent-dag); }
    .nacht .dot { background: var(--accent-nacht); }
    .card-arrow { position: absolute; right: 16px; bottom: 16px; font-size: 16px; opacity: 0; transition: opacity 0.15s, right 0.15s; }
    .card.dag .card-arrow { color: var(--accent-dag); }
    .card.nacht .card-arrow { color: var(--accent-nacht); }
    .card:hover .card-arrow { opacity: 1; right: 12px; }
    .empty-msg { padding: 60px 40px; color: var(--muted); font-size: 13px; letter-spacing: 1px; display: none; }
    .legend { display: flex; gap: 20px; padding: 0 40px; margin-top: -24px; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    @media (max-width: 600px) {
      header, .controls, .groups, .legend { padding-left: 20px; padding-right: 20px; }
      .search-wrap { margin-left: 0; width: 100%; }
      .search-wrap input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">Route Monitoring</div>
  <h1>Kaarten<br><span>Overzicht</span></h1>
  <div class="header-meta">46 routes &nbsp;·&nbsp; 13 routecodes &nbsp;·&nbsp; feb–mrt 2026</div>
</header>

<div class="controls">
  <button class="filter-btn active-all" data-filter="all">Alles</button>
  <button class="filter-btn" data-filter="dag">☀ Dag</button>
  <button class="filter-btn" data-filter="nacht">☾ Nacht</button>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Zoek route, kenteken of datum…"/>
  </div>
</div>

<div style="height:24px"></div>
<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#f5c842"></span> Dag</div>
  <div class="legend-item"><span class="legend-dot" style="background:#4a7cff"></span> Nacht</div>
</div>

<div class="groups" id="groups"></div>
<div class="empty-msg" id="empty">Geen resultaten gevonden.</div>

<script>
const routes = [
  "route_C233_2026-02-23_Dag_2ESL989.html",
  "route_C233_2026-02-23_Nacht_2ESL989.html",
  "route_C235_2026-02-19_Nacht_2EHL792.html",
  "route_C251_2026-02-19_Nacht_2EGP897.html",
  "route_C251_2026-02-23_Dag_2EGP897.html",
  "route_C251_2026-02-23_Nacht_2EGP897.html",
  "route_C251_2026-02-24_Dag_2EGP897.html",
  "route_C251_2026-02-24_Nacht_2EGP897.html",
  "route_C251_2026-02-25_Nacht_2EGP897.html",
  "route_C251_2026-02-26_Nacht_2EGP897.html",
  "route_C251_2026-02-27_Dag_2EGP897.html",
  "route_C251_2026-02-27_Nacht_2EGP897.html",
  "route_C251_2026-03-02_Dag_2EGP897.html",
  "route_C251_2026-03-02_Nacht_2EGP897.html",
  "route_C252_2026-02-19_Nacht_2FHP125.html",
  "route_C253_2026-02-23_Dag_2EKC516.html",
  "route_C253_2026-02-25_Nacht_2EKC516.html",
  "route_C253_2026-03-02_Nacht_2EKC516.html",
  "route_C254_2026-02-23_Nacht_2EGP932.html",
  "route_C254_2026-02-24_Nacht_2EGP932.html",
  "route_C254_2026-02-25_Nacht_2EGP932.html",
  "route_C254_2026-02-26_Nacht_2EGP932.html",
  "route_C254_2026-02-27_Nacht_2EGP932.html",
  "route_C261_2026-03-02_Nacht_2HSJ784.html",
  "route_C262_2026-02-19_Nacht_2HUF877.html",
  "route_C262_2026-02-23_Dag_2HUF877.html",
  "route_C262_2026-02-23_Nacht_2HUF877.html",
  "route_C262_2026-02-25_Nacht_2HUF877.html",
  "route_C262_2026-02-26_Nacht_2HUF877.html",
  "route_C262_2026-02-27_Nacht_2HUF877.html",
  "route_C262_2026-03-02_Dag_2HUF877.html",
  "route_C263_2026-02-19_Nacht_2HVW963.html",
  "route_C263_2026-02-24_Nacht_2HVW963.html",
  "route_C263_2026-02-26_Nacht_2HVW963.html",
  "route_C263_2026-02-27_Nacht_2HVW963.html",
  "route_C265_2026-02-25_Nacht_2HNY051.html",
  "route_C265_2026-02-26_Nacht_2HNY051.html",
  "route_C265_2026-02-27_Dag_2HNY051.html",
  "route_C265_2026-02-27_Nacht_2HNY051.html",
  "route_N251_2026-02-23_Dag_2HQS128.html",
  "route_N251_2026-02-24_Dag_2HQS128.html",
  "route_N253_2026-02-23_Dag_2JBM571.html",
  "route_N253_2026-02-24_Dag_2JBM571.html",
  "route_N253_2026-02-25_Dag_2JBM571.html",
  "route_N253_2026-02-26_Dag_2JBM571.html",
  "route_N253_2026-02-27_Dag_2JBM571.html",
];

function parseRoute(filename) {
  const m = filename.match(/route_([^_]+)_(\d{4}-\d{2}-\d{2})_(Dag|Nacht)_([^.]+)\.html/);
  if (!m) return null;
  return { filename, route: m[1], date: m[2], type: m[3].toLowerCase(), plate: m[4] };
}

function formatDate(dateStr) {
  const [y, mo, d] = dateStr.split('-');
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return `${parseInt(d)} ${months[parseInt(mo)-1]} ${y}`;
}

const parsed = routes.map(parseRoute).filter(Boolean);

const groups = {};
parsed.forEach(r => {
  const key = `${r.route}__${r.plate}`;
  if (!groups[key]) groups[key] = { route: r.route, plate: r.plate, items: [] };
  groups[key].items.push(r);
});

const groupsEl = document.getElementById('groups');
const emptyEl = document.getElementById('empty');

function renderGroups(filter = 'all', query = '') {
  groupsEl.innerHTML = '';
  let totalVisible = 0;

  Object.values(groups).forEach(({ route, plate, items }) => {
    const filtered = items.filter(r => {
      const typeMatch = filter === 'all' || r.type === filter;
      const q = query.toLowerCase();
      const queryMatch = !q || r.route.toLowerCase().includes(q) || r.plate.toLowerCase().includes(q) || r.date.includes(q);
      return typeMatch && queryMatch;
    });
    if (!filtered.length) return;
    totalVisible += filtered.length;

    const groupDiv = document.createElement('div');
    groupDiv.className = 'group';

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <span class="group-route">${route}</span>
      <span class="group-plate">${plate}</span>
      <span class="group-count">${filtered.length} route${filtered.length !== 1 ? 's' : ''}</span>
    `;
    groupDiv.appendChild(header);

    const cards = document.createElement('div');
    cards.className = 'cards';

    filtered.forEach(r => {
      const a = document.createElement('a');
      a.className = `card ${r.type}`;
      a.href = r.filename;
      a.innerHTML = `
        <div class="card-date">${formatDate(r.date)}</div>
        <div class="card-type"><span class="dot"></span>${r.type === 'dag' ? '☀ Dag' : '☾ Nacht'}</div>
        <span class="card-arrow">→</span>
      `;
      cards.appendChild(a);
    });

    groupDiv.appendChild(cards);
    groupsEl.appendChild(groupDiv);
  });

  emptyEl.style.display = totalVisible === 0 ? 'block' : 'none';
}

let activeFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    btn.classList.add(`active-${activeFilter}`);
    renderGroups(activeFilter, document.getElementById('search').value);
  });
});

document.getElementById('search').addEventListener('input', e => {
  renderGroups(activeFilter, e.target.value);
});

renderGroups();
</script>
</body>
</html>
