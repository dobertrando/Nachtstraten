<html lang="nl">
<head>
  <meta charset="UTF-8"/>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#141720;--border:#1e2230;--accent-dag:#f5c842;--accent-nacht:#4a7cff;--text:#e8eaf0;--muted:#6b7280;--card-hover:#1a1f2e}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;padding:0 0 80px}
header{padding:60px 40px 40px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(74,124,255,.12) 0%,transparent 70%);pointer-events:none}
.header-label{font-size:11px;letter-spacing:4px;color:var(--accent-nacht);text-transform:uppercase;margin-bottom:16px}
h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:800;line-height:1.1;letter-spacing:-1px}
h1 span{color:var(--accent-nacht)}
.header-meta{margin-top:16px;font-size:12px;color:var(--muted)}
.tab-nav{padding:0 40px;border-bottom:1px solid var(--border);display:flex;gap:0;overflow-x:auto}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:16px 20px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);font-weight:600}
.sector-panel{display:none;padding:32px 40px 0}
.sector-panel.active{display:block}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:24px}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:7px 16px;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:1px}
.filter-btn:hover{border-color:var(--accent-nacht);color:var(--text)}
.filter-btn.active-dag{background:var(--accent-dag);color:#0d0f14;border-color:var(--accent-dag);font-weight:600}
.filter-btn.active-nacht{background:var(--accent-nacht);color:#fff;border-color:var(--accent-nacht);font-weight:600}
.filter-btn.active-all{background:var(--text);color:#0d0f14;border-color:var(--text);font-weight:600}
.search-wrap{margin-left:auto;position:relative}
.search-wrap input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:7px 14px 7px 36px;border-radius:4px;width:240px;outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--accent-nacht)}
.search-wrap::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.route-groups{display:flex;flex-direction:column;gap:40px}
.group-header{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.group-route{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;background:var(--surface);border:1px solid var(--border);padding:4px 14px;border-radius:4px}
.group-plate{font-size:11px;color:var(--accent-nacht);letter-spacing:2px}
.group-count{font-size:11px;color:var(--muted);letter-spacing:2px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;text-decoration:none;color:var(--text);transition:background .15s,border-color .15s,transform .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.card.dag::before{background:var(--accent-dag)}
.card.nacht::before{background:var(--accent-nacht)}
.card:hover{background:var(--card-hover);transform:translateY(-2px)}
.card.dag:hover{border-color:var(--accent-dag)}
.card.nacht:hover{border-color:var(--accent-nacht)}
.card-date{font-size:13px;font-weight:600;margin-bottom:8px}
.card-type{font-size:11px;letter-spacing:2px;display:flex;align-items:center;gap:6px}
.card.dag .card-type{color:var(--accent-dag)}
.card.nacht .card-type{color:var(--accent-nacht)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dag .dot{background:var(--accent-dag)}
.nacht .dot{background:var(--accent-nacht)}
.card-arrow{position:absolute;right:14px;bottom:14px;font-size:14px;opacity:0;transition:opacity .15s,right .15s}
.card.dag .card-arrow{color:var(--accent-dag)}
.card.nacht .card-arrow{color:var(--accent-nacht)}
.card:hover .card-arrow{opacity:1;right:10px}
.empty-msg{padding:40px 0;color:var(--muted);font-size:13px;letter-spacing:1px;display:none}
.legend{display:flex;gap:20px;margin-bottom:24px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);letter-spacing:1px}
.legend-dot{width:8px;height:8px;border-radius:50%}
@media(max-width:600px){header,.tab-nav,.sector-panel{padding-left:20px;padding-right:20px}.search-wrap{margin-left:0;width:100%}.search-wrap input{width:100%}}
</style>
</head>

function renderPanel(panelEl, filter, query) {
  const sector = panelEl.dataset.sector;
  const groupsEl = panelEl.querySelector('.route-groups');
  const emptyEl  = panelEl.querySelector('.empty-msg');
  groupsEl.innerHTML = '';
  let total = 0;

  (DATA[sector] || []).forEach(({route, plate, items}) => {
    const filtered = items.filter(r => {
      const typeOk  = filter === 'all' || r.type === filter;
      const q = query.toLowerCase();
      const qOk = !q || (r.route||'').toLowerCase().includes(q)
                     || r.plate.toLowerCase().includes(q)
                     || r.date.includes(q);
      return typeOk && qOk;
    });
    if (!filtered.length) return;
    total += filtered.length;

    const g = document.createElement('div');
    g.className = 'group';
    const label    = route && route !== plate ? route : plate;
    const sublabel = route && route !== plate ? `<span class="group-plate">${plate}</span>` : '';
    g.innerHTML = `<div class="group-header">
      <span class="group-route">${label}</span>${sublabel}
      <span class="group-count">${filtered.length} route${filtered.length!==1?'s':''}</span>
    </div><div class="cards"></div>`;

    const cards = g.querySelector('.cards');
    filtered.forEach(r => {
      const a = document.createElement('a');
      a.className = `card ${r.type}`;
      a.href = r.filename;
      a.innerHTML = `<div class="card-date">${r.dateFormatted}</div>
        <div class="card-type"><span class="dot"></span>${r.type==='dag'?'☀ Dag':'☾ Nacht'}</div>
        <span class="card-arrow">→</span>`;
      cards.appendChild(a);
    });
    groupsEl.appendChild(g);
  });

  emptyEl.style.display = total === 0 ? 'block' : 'none';
}

const state = {};
document.querySelectorAll('.sector-panel').forEach(panel => {
  const s = panel.dataset.sector;
  state[s] = {filter:'all', query:''};

  panel.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state[s].filter = btn.dataset.filter;
      panel.querySelectorAll('.filter-btn').forEach(b => b.className='filter-btn');
      btn.classList.add('active-' + btn.dataset.filter);
      renderPanel(panel, state[s].filter, state[s].query);
    });
  });
  panel.querySelector('input').addEventListener('input', e => {
    state[s].query = e.target.value;
    renderPanel(panel, state[s].filter, state[s].query);
  });
  renderPanel(panel, 'all', '');
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const kleur = btn.dataset.kleur;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.style.borderBottomColor = 'transparent';
    });
    document.querySelectorAll('.sector-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.style.borderBottomColor = kleur;
    document.querySelector(`.sector-panel[data-sector="${btn.dataset.sector}"]`).classList.add('active');
  });
});

</script>
